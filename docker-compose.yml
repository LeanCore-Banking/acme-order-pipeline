services:
  # === APLICACIÓN ===
  api:
    build: .
    container_name: ecommerce_api
    ports:
      - "8080:8080"
    environment:
      POSTGRES_DSN: postgresql+psycopg://postgres:postgres123@postgres:5432/ecommerce_inventory
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/?authSource=admin
      MONGO_DB: ecommerce_orders
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_ORDERS_CREATED: orders.created
      TAX_RATE: 0.08
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  worker:
    build: .
    container_name: ecommerce_worker
    entrypoint: ["/worker-entrypoint.sh"]
    environment:
      POSTGRES_DSN: postgresql+psycopg://postgres:postgres123@postgres:5432/ecommerce_inventory
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/?authSource=admin
      MONGO_DB: ecommerce_orders
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_ORDERS_CREATED: orders.created
      KAFKA_GROUP_ID: orders-worker
      KAFKA_AUTO_OFFSET_RESET: earliest
      KAFKA_ENABLE_AUTO_COMMIT: "true"
      TAX_RATE: 0.08
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - ecommerce_network
    restart: unless-stopped

  # === INFRAESTRUCTURA ===
  postgres:
    image: postgres:16
    container_name: ecommerce_postgres
    environment:
      POSTGRES_DB: ecommerce_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: ecommerce_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: ecommerce_orders
    ports:
      - "57017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./init-scripts/mongodb:/docker-entrypoint-initdb.d
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Zookeeper simplificado
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecommerce_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka simplificado
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - "9092:29092"
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Inicializar topics de Kafka
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - ecommerce_network
    command: >
      bash -c "
        echo 'Creando topics de Kafka...'
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic orders.created --partitions 3 --replication-factor 1
        echo 'Topics creados exitosamente!'
        kafka-topics --bootstrap-server kafka:29092 --list
      "
    restart: "no"
  
volumes:
  postgres_data:
  mongodb_data:

networks:
  ecommerce_network:
    driver: bridge