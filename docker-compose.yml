services:
  postgres:
    image: postgres:16
    container_name: ecommerce_postgres
    environment:
      POSTGRES_DB: ecommerce_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: ecommerce_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: ecommerce_orders
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./init-scripts/mongodb:/docker-entrypoint-initdb.d
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecommerce_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ecommerce_network
    # Healthcheck removido para compatibilidad con Windows

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce_kafka
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - "9092:9092"
    networks:
      - ecommerce_network

  api:
    build: ./backend
    container_name: ecommerce_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ecommerce_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ecommerce_network

  worker:
    build: ./backend
    container_name: ecommerce_worker
    command: python -m consumer.main
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ecommerce_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PYTHONPATH: /app
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce_network

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  kafka_data:
    driver: local

networks:
  ecommerce_network:
    driver: bridge
